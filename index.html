<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8KXR - 赛博朋克个人主页</title>
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Consolas', monospace;
        }
        
        /* 背景粒子 + 霓虹效果 */
        body {
            background: #000;
            overflow-x: hidden;
            position: relative;
        }
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        
        /* 主体容器 */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 50px 20px;
            color: #fff;
        }
        
        /* 霓虹标题 */
        .title {
            font-size: 4rem;
            text-align: center;
            margin-bottom: 80px;
            background: linear-gradient(90deg, #0ff, #f0f, #ff0);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: neon 3s linear infinite;
            position: relative;
        }
        @keyframes neon {
            to { background-position: 200% center; }
        }
        
        /* 卡片动效 */
        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }
        .card {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #0ff;
            padding: 30px;
            border-radius: 10px;
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: all 0.5s ease;
        }
        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 0 30px #0ff, 0 0 60px #f0f;
        }
        .card:hover::before {
            left: 100%;
        }
        
        /* 按钮动效 */
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 30px;
            background: transparent;
            border: 1px solid #ff0;
            color: #ff0;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,0,0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.5s ease;
        }
        .btn:hover::after {
            width: 300px;
            height: 300px;
            opacity: 0;
        }
        .btn:hover {
            background: #ff0;
            color: #000;
            box-shadow: 0 0 15px #ff0;
        }
        
        /* 鼠标跟随 */
        #cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 1px solid #0ff;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            mix-blend-mode: difference;
            transition: all 0.1s ease;
        }
    </style>
</head>
<body>
    <!-- 鼠标跟随元素 -->
    <div id="cursor"></div>
    
    <!-- 粒子背景 -->
    <div id="particles-js"></div>
    
    <div class="container">
        <h1 class="title">8KXR's Homepage</h1>
        
        <div class="card-container">
            <div class="card">
                <h2>✨ 炫酷动效</h2>
                <p>包含霓虹渐变、鼠标跟随、卡片悬浮、粒子背景等多种动效</p>
                <button class="btn">点击试试</button>
            </div>
            <div class="card">
                <h2>🚀 适配移动端</h2>
                <p>响应式设计，手机/平板/电脑都能完美显示</p>
                <button class="btn">查看详情</button>
            </div>
            <div class="card">
                <h2>🎯 自定义简单</h2>
                <p>修改文字/图片/颜色即可变成你的专属页面</p>
                <button class="btn">立即修改</button>
            </div>
        </div>
    </div>

    <!-- 粒子动画脚本 -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // 粒子背景配置
        particlesJS('particles-js', {
            particles: {
                number: { value: 80, density: { enable: true, value_area: 800 } },
                color: { value: ['#0ff', '#f0f', '#ff0'] },
                shape: { type: 'circle' },
                opacity: { value: 0.5, random: true },
                size: { value: 3, random: true },
                line_linked: { enable: true, distance: 150, color: '#0ff', opacity: 0.2, width: 1 },
                move: { enable: true, speed: 1, direction: 'none', random: true, straight: false, out_mode: 'out', bounce: false }
            },
            interactivity: {
                detect_on: 'canvas',
                events: {
                    onhover: { enable: true, mode: 'grab' },
                    onclick: { enable: true, mode: 'push' },
                    resize: true
                },
                modes: {
                    grab: { distance: 140, line_linked: { opacity: 1 } },
                    push: { particles_nb: 4 }
                }
            },
            retina_detect: true
        });

        // 鼠标跟随效果
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // 按钮点击动效
        const btns = document.querySelectorAll('.btn');
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                alert('动效触发成功！替换成你的功能吧～');
            });
        });
    </script>
</body>
</html>
